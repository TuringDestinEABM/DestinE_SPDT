<!-- Table for accessing reports -->

<div class="card shadow-md bg-body rounded border bg-light">
    <div class="card-header"><h6>Reports</h6></div>
    <div id="card-container">
        
        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Created</th>
                    <th>User</th>
                    <th>Link</th>
                <tr>
            </thead>
            <tbody>
                
                {% for item in data.items %}
                <tr>
                    <td>{{item.scenario_name}}</td>
                    <td>{{item.timestamp}}</td>
                    <td>{{item.user_name}}</td>
                    <td><a href="/reports/{{item.scenario_name}}" >.../reports/{{item.scenario_name}}</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
